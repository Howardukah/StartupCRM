<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Link Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f7f7f7;
      text-align: center;
    }
    h1 {
      font-size: 80px;
      margin: 0 0 10px 0;
      color: #111;
      letter-spacing: 2px;
    }
    h2 {
      font-size: 24px;
      margin: 0 0 10px 0;
      color: #777;
      font-weight: 500;
    }
    p {
      color: #aaa;
      font-size: 14px;
      margin: 5px 0;
    }
    .contact {
      margin-top: 30px;
      font-size: 14px;
      color: #111;
      font-weight: 500;
    }
    .contact a {
      color: #111;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
<style>
    .btn, button:not(.theme-toggle):not(.team-add-btn):not(.avatar):not(.circle-btn), .input, .field__input, input[type="text"], input[type="search"], input[type="number"], input[type="email"], input[type="password"] {
      border-radius: 4px !important;
    }
    .theme-toggle, .team-add-btn {
      border-radius: 50% !important;
    }
    </style>
</head>
<body>
  <h1>404</h1>
  <h2>Oops, This Link Not Found!</h2>
  <p>The link might be corrupted,</p>
  <p>or the link may have been removed</p>
  
  <div class="contact">
    Contact <a href="mailto:support@startupbuild.tech">support@startupbuild.tech</a> for queries
  </div>
</body>
</html>
